<style>
  :root{
    --sumi:#0E0C0A; --sumi-2:#141009; --panel:#17120C; --raised:#1F1810;

    --swim:#6E93A8; --bike:#C9A961; --run:#7E9A56; --gym:#9C7BA6; --rest:#6E6553;

  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0}
  #app{max-width:440px; margin:0 auto; background:var(--sumi); color:var(--bone-2);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100vh; position:relative; padding-bottom:76px}
  .bar{position:sticky; top:0; z-index:20; background:var(--sumi-2); border-bottom:1px solid var(--line); border-top:2px solid var(--shu); padding:10px 14px; display:flex; align-items:center; gap:10px}
  .bar .ttl{font-size:16px; letter-spacing:4px; color:var(--kin)}
  .bar .sub{margin-left:auto; font-size:12px; color:var(--bone-3); text-align:right; line-height:1.3}
  .wrap{padding:14px}

  .h{letter-spacing:3px; font-size:13px; color:var(--kin); border:1px solid var(--line-2); border-radius:0; padding:7px 0; text-align:center; background:var(--panel); margin-bottom:10px}
  .lbl{font-size:11px; color:var(--bone-3); letter-spacing:1px; text-transform:uppercase}
  .muted{color:var(--bone-2)}
  .goal{font-size:13px; color:var(--bone); line-height:1.55}
  .dnav{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:8px}
  .dnav button{background:var(--raised); border:1px solid var(--line-2); color:var(--kin); border-radius:var(--r); height:36px; width:42px; font-size:17px}

  .dnav .cur .d{font-size:15px; color:var(--bone)}
  .dnav .cur .w{font-size:11px; color:var(--bone-3)}
  .stale{color:var(--shu); letter-spacing:1px; border-bottom:1px dotted var(--shu); cursor:pointer}
  .today{width:auto !important; padding:0 10px; font-size:12px !important; letter-spacing:1px}
  .today.on{background:var(--kin); border-color:var(--kin); color:#14100A}
  .sess{border:1px solid var(--line); border-radius:var(--r); background:var(--raised); padding:10px; margin-bottom:10px}
  .sess.done{border-color:var(--kin-d); background:#1A1409}
  .sess .top{display:flex; align-items:flex-start; gap:9px}
  .sess .ic{font-size:20px; line-height:1; margin-top:1px}
  .sess .nm{font-size:14px; color:var(--bone)}
  .sess .meta{font-size:12px; color:var(--bone-3); margin-top:2px}
  .sess .struct{font-size:12px; color:var(--bone-2); margin-top:5px; line-height:1.45}
  .sess .gl{font-size:12px; color:var(--kin); margin-top:4px}
  .chip{display:inline-block; font-size:11px; color:var(--kin); border:1px solid var(--line-2); border-radius:0; padding:1px 5px; margin-right:4px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}
  .fld{margin-top:8px}
  input,select,textarea{width:100%; background:var(--raised); border:1px solid var(--line-2); color:var(--bone); border-radius:var(--r); height:36px; padding:0 9px; font-size:14px; font-family:inherit}
  input::placeholder,textarea::placeholder{color:var(--bone-3)}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--kin)}
  textarea{height:auto; padding:7px 8px; resize:vertical}
  input[type=range]{padding:0; height:24px; accent-color:var(--kin)}
  input[type=time],input[type=number]{color-scheme:dark}
  .rate{display:flex; gap:5px}
  .rate button{flex:1; height:34px; border:1px solid var(--line-2); background:var(--raised); color:var(--bone-2); border-radius:var(--r); font-size:13px}
  .rate button.on{background:var(--kin); border-color:var(--kin); color:#14100A}

  .toggle{background:var(--raised); border:1px solid var(--line-2); color:var(--bone-2); border-radius:var(--r); height:30px; padding:0 12px; font-size:12px}
  .toggle.on{background:var(--kin); border-color:var(--kin); color:#14100A}
  .nav{position:fixed; bottom:0; left:0; right:0; max-width:440px; margin:0 auto; background:var(--sumi-2); border-top:1px solid var(--line); display:flex; gap:5px; height:68px; padding:7px 7px calc(7px + env(safe-area-inset-bottom, 0px))}
  .nav button{flex:1; background:var(--raised); border:1px solid var(--line-2); border-radius:var(--r); color:var(--bone-3); font-size:11px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:0}
  .nav button i{font-size:19px}
  .nav button.on{background:var(--kin); border-color:var(--kin); color:#14100A}
  .nav button:active{border-color:var(--kin)}
  .row{display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--line); font-size:13px}
  .row:last-child{border-bottom:none}
  .badge{font-size:11px; padding:2px 7px; border-radius:0; border:1px solid var(--line-2); color:var(--bone-2)}
  .badge.rec{background:#1A1409; border-color:var(--kin-d); color:var(--kin)}
  .badge.race{background:#241010; border-color:#7A2A24; color:#E58B7F}
  .subnav{display:flex; gap:6px; overflow-x:auto; margin-bottom:12px; padding-bottom:2px}
  .subnav button{white-space:nowrap; background:var(--raised); border:1px solid var(--line-2); color:var(--bone-2); border-radius:var(--r); height:34px; padding:0 13px; font-size:13px}
  .subnav button.on{background:var(--kin); border-color:var(--kin); color:#14100A}
  .sec{font-size:12px; color:var(--kin); letter-spacing:2px; margin:12px 0 6px; text-transform:uppercase}
  table{width:100%; border-collapse:collapse; font-size:12px}
  td,th{border:1px solid var(--line); padding:5px 6px; text-align:left; color:var(--bone); vertical-align:top}
  th{color:var(--kin); font-weight:500; background:var(--panel); letter-spacing:1px}
  .kv{font-size:13px; color:var(--bone); line-height:1.55}
  .kv b{color:var(--bone-2); font-weight:500}
  .stat{display:flex; align-items:center; gap:8px; padding:7px 0}
  .stat .n{margin-left:auto; font-size:15px; color:var(--bone)}

  .savedmsg{text-align:center; font-size:12px; color:var(--kin); margin-top:8px; min-height:14px}
  .gymlog{margin-top:8px}
  .exrow{border:1px solid var(--line); border-radius:var(--r); background:var(--raised); padding:8px; margin-bottom:7px}
  .exname{font-size:13px; color:var(--bone)}

  .setno{font-size:12px; color:var(--bone-3); width:16px; text-align:center; flex:none}
  .setrow input{height:30px; text-align:center}
  .delset{flex:none; width:30px; height:30px; background:var(--panel); border:1px solid var(--line-2); color:#C97B6E; border-radius:var(--r); font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center; padding:0}

<script>
let PLAN = {weeks:[]};   // план приезжает из картриджа; запасной — в памяти браузера

const DISC_IC = {'Плавание':'ti-swimming','Вело':'ti-bike','Бег':'ti-run','Зал':'ti-barbell','Отдых':'ti-bed','Восстановление':'ti-bed'};
const DISC_COL = {'Плавание':'var(--swim)','Вело':'var(--bike)','Бег':'var(--run)','Зал':'var(--gym)','Отдых':'var(--rest)'};

function gymExercises(sessName){
  // sessName like "Зал A — сила ног/мощность" or "Зал B — ..."
  const isA = /Зал A/.test(sessName);
  const isB = /Зал B/.test(sessName);
  const out=[]; let cur=null;
  (PLAN.gym||[]).forEach(g=>{
    if(!g.ex){ cur=g.block; return; }
    const inA = (g.block==='A');
    const inB = (g.block==='B' || g.block==='Резина');
    if((isA&&inA)||(isB&&inB)) out.push({name:g.ex, ref:(g.p2||g.p01), focus:g.focus});
  });
  return out;
}

// ==== Telegram Mini App + backend API ====
// ВАЖНО: впиши сюда HTTPS-адрес своего API (Cloudflare Tunnel / домен), без / в конце.
const API_BASE = "https://stonehand.tailcf8ca3.ts.net";
const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
function tgInit(){ return (TG && TG.initData) ? TG.initData : ''; }
function apiOn(){ return API_BASE && API_BASE.indexOf('REPLACE')<0 && tgInit(); }
async function apiFetch(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({'Content-Type':'application/json','X-Init-Data':tgInit()}, opts.headers||{});
  const r = await fetch(API_BASE + path, opts);
  if(!r.ok) throw new Error('API '+r.status);
  return r.json();
}
const mem = {};
async function stGet(k){
  if(k.indexOf('log:')===0 && apiOn()){ try{ const d=await apiFetch('/api/log/'+k.slice(4)); return d.data||null; }catch(e){ console.warn('get',e); } }
  try{ if(window.storage){ const r=await window.storage.get(k); return r&&r.value?JSON.parse(r.value):null; } }catch(e){}
  return (k in mem)?mem[k]:null;
}
async function stSet(k,v){
  if(k.indexOf('log:')===0 && apiOn()){ try{ await apiFetch('/api/log/'+k.slice(4),{method:'POST',body:JSON.stringify({data:v})}); return; }catch(e){ console.warn('set',e); } }
  try{ if(window.storage){ await window.storage.set(k, JSON.stringify(v)); return; } }catch(e){}
  mem[k]=v;
}
// Все дни одним запросом. Было: N последовательных HTTP на каждую отрисовку журнала.
async function stAll(){
  if(apiOn()){
    try{ const d=await apiFetch('/api/logs/all'); return d.logs||{}; }
    catch(e){ console.warn('all',e); }
  }
  const out={};
  for(const k of await stList('log:')){ const v=await stGet(k); if(v) out[k.slice(4)]=v; }
  return out;
}
async function stList(pre){
  if(pre==='log:' && apiOn()){ try{ const d=await apiFetch('/api/logs'); return (d.keys||[]).map(function(iso){return 'log:'+iso;}); }catch(e){ console.warn('list',e); } }
  try{ if(window.storage){ const r=await window.storage.list(pre); return r&&r.keys?r.keys:[]; } }catch(e){}
  return Object.keys(mem).filter(function(k){return k.indexOf(pre)===0;});
}

function isoToday(){
  const t=new Date(); const p=n=>String(n).padStart(2,'0');
  return t.getFullYear()+'-'+p(t.getMonth()+1)+'-'+p(t.getDate());
}
let ALLDAYS=[];
let PLAN_SRC=null;          // мета картриджа: версия, когда сгружены факты
let PLAN_FALLBACK=true;     // true = на экране план из памяти, он мог устареть
const PLAN_CACHE='plan:cache:v1';
// Запоминаем последний ПОЛУЧЕННЫЙ план. Раньше страховкой была копия, вшитая в файл
// в день деплоя: она весила 242 КБ и устаревала с каждой выкаткой. Эта — свежее
// и ничего не весит. Всё в try: в песочнице браузера доступ к памяти может быть закрыт.
function planCacheGet(){
  try{ const s=localStorage.getItem(PLAN_CACHE); return s?JSON.parse(s):null; }catch(e){ return null; }
}
function planCacheSet(plan){
  try{ localStorage.setItem(PLAN_CACHE, JSON.stringify(plan)); }catch(e){ console.warn('кэш плана не записался', e); }
}
let BOOTED=false, PLAN_TRY=false;
function rebuildDays(){
  ALLDAYS=[];
  PLAN.weeks.forEach(w=>w.days.forEach(d=>ALLDAYS.push(Object.assign({week:w},d))));
}
rebuildDays();
function findDayIso(iso){
  if(!ALLDAYS.length) return null;
  let ex=ALLDAYS.find(d=>d.iso===iso); if(ex) return ex;
  if(iso<ALLDAYS[0].iso) return ALLDAYS[0];
  if(iso>ALLDAYS[ALLDAYS.length-1].iso) return ALLDAYS[ALLDAYS.length-1];
  return ALLDAYS[0];
}
function shiftIso(iso,delta){
  const i=ALLDAYS.findIndex(d=>d.iso===iso);
  const j=Math.max(0,Math.min(ALLDAYS.length-1,(i<0?0:i)+delta));
  return ALLDAYS[j].iso;
}

// Черновик дня. Раньше жил внутри renderToday и умирал при любом уходе со вкладки:
// заполнил зал на 20 чисел, нажал '›' — всё стёрто, без вопроса. Теперь: автосохранение
// через 1.5 с после последней правки + принудительный сброс перед любым уходом.
let DRAFT=null, DRAFT_ISO=null, DRAFT_T=null;
function draftTouch(){
  if(DRAFT_T) clearTimeout(DRAFT_T);
  DRAFT_T=setTimeout(()=>{ flushDraft(); }, 1500);
}
async function flushDraft(){
  if(DRAFT_T){ clearTimeout(DRAFT_T); DRAFT_T=null; }
  if(!DRAFT || !DRAFT_ISO) return;
  const iso=DRAFT_ISO, d=DRAFT;
  await stSet('log:'+iso, d);
  const m=document.getElementById('savedMsg');
  if(m && DRAFT_ISO===iso) m.textContent='сохранено ✓';
}
let TAB='today';
let CUR = isoToday();
let INFOSUB='overview';

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function render(){
  const v=document.getElementById('view');
  const cur=findDayIso(CUR);
  if(!cur){ renderNoPlan(v); return; }
  document.getElementById('barSub').innerHTML = 'Неделя '+cur.week.n+' · '+esc(cur.week.phase)+'<br>'+esc(cur.week.weekType)
    + (PLAN_FALLBACK ? '<br><span class="stale" id="staleTag">план из памяти</span>' : '');
  if(TAB==='today') await renderToday(v,cur);
  else if(TAB==='plan') renderPlan(v);
  else if(TAB==='log') await renderLog(v);
  else if(TAB==='sleep') await renderSleep(v);
  else if(TAB==='info') renderInfo(v);
  renderNav();
  const tag=document.getElementById('staleTag');
  if(tag) tag.onclick=()=>{ tag.textContent='ищу связь…'; retryPlan(); setTimeout(()=>{ if(PLAN_FALLBACK) render(); }, 3000); };
}

// Единственный случай: первый запуск на новом устройстве И сервер недоступен.
// Лучше сказать прямо, чем показать пустоту.
function renderNoPlan(v){
  document.getElementById('barSub').innerHTML='<span class="stale">нет плана</span>';
  v.innerHTML='<div class="panel"><div class="h">КАРТРИДЖ НЕ ЧИТАЕТСЯ</div>'
    +'<div style="font-size:13px;color:var(--bone);line-height:1.55">'
    +'План не пришёл с сервера, а в памяти этого устройства его ещё нет.<br><br>'
    +(apiOn()?'Проверь связь — приложение попробует снова.':'Приложение открыто вне Telegram: подписи нет, сервер не ответит.')
    +'</div></div>'
    +'<button class="save" id="retryPlan">ПОПРОБОВАТЬ СНОВА</button>'
    +'<div class="savedmsg" id="retryMsg"></div>';
  const btn=document.getElementById('retryPlan'), msg=document.getElementById('retryMsg');
  btn.onclick=async()=>{ msg.textContent='ищу связь…'; msg.style.color='var(--kin)';
    const ok=await loadPlan();
    if(!ok){ msg.textContent='связи нет'; msg.style.color='var(--err)'; }
  };
  renderNav();
}


// ==== ГРАФИКИ ====
// Свой SVG, без библиотек: Chart.js весит больше всего приложения и не работает
// без сети, а приложение открывается в бассейне и в парке.
// Честность важнее красоты: пока точек мало — прямо пишем, сколько ещё нужно,
// а не рисуем «тренд» по двум замерам.

function dnum(iso){ return Math.round(new Date(iso+'T00:00:00')/864e5); }
function ddmm(iso){ const p=iso.split('-'); return p[2]+'.'+p[1]; }

function needMore(title, have, need, why){
  return '<div class="panel"><div class="lbl">'+title+'</div>'
    +'<div style="font-size:12px;color:var(--bone-2);margin-top:6px;line-height:1.5">'
    +why+'<br>Записей: <b style="color:var(--kin)">'+have+'</b> из '+need+'.</div></div>';
}

// Каркас: рамка, сетка, подписи оси Y. Возвращает {open, close, X, Y}.
function plot(pts, ymin, ymax, w, h){
  const L=30, R=6, T=8, B=16;
  const xs=pts.map(p=>p.x), x0=Math.min.apply(null,xs), x1=Math.max.apply(null,xs);
  const span=(x1-x0)||1;
  const X=x=>L+((x-x0)/span)*(w-L-R);
  const Y=y=>T+(1-(y-ymin)/((ymax-ymin)||1))*(h-T-B);
  let g='';
  for(let i=0;i<=2;i++){
    const val=ymin+(ymax-ymin)*i/2, y=Y(val);
    g+='<line x1="'+L+'" y1="'+y.toFixed(1)+'" x2="'+(w-R)+'" y2="'+y.toFixed(1)+'" stroke="var(--line)" stroke-width="1"/>'
      +'<text x="'+(L-4)+'" y="'+(y+3).toFixed(1)+'" fill="var(--bone-3)" font-size="8" text-anchor="end">'+(Math.round(val*10)/10)+'</text>';
  }
  return {open:'<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block">'+g, close:'</svg>', X:X, Y:Y, L:L, B:B, W:w, H:h};
}

function xTicks(p, pts){
  let g='';
  const step=Math.max(1, Math.ceil(pts.length/5));
  pts.forEach((pt,i)=>{ if(i%step && i!==pts.length-1) return;
    g+='<text x="'+p.X(pt.x).toFixed(1)+'" y="'+(p.H-4)+'" fill="var(--bone-3)" font-size="8" text-anchor="middle">'+ddmm(pt.iso)+'</text>'; });
  return g;
}

// 1. Пульс покоя: точки + 7-дневное среднее. Ранний маркер недовосстановления.
function chartHR(all){
  const pts=Object.keys(all).sort().map(iso=>{
    const hr=parseFloat(((all[iso].sleep)||{}).hr);
    return (hr>25 && hr<120) ? {iso, x:dnum(iso), y:hr} : null;
  }).filter(Boolean);
  if(pts.length<3) return needMore('ПУЛЬС ПОКОЯ', pts.length, 3, 'Тренд по двум утрам — гадание.');

  const lo=Math.min.apply(null,pts.map(p=>p.y)), hi=Math.max.apply(null,pts.map(p=>p.y));
  const p=plot(pts, Math.floor(lo-2), Math.ceil(hi+2), 380, 120);
  let g=p.open;
  // 7-дневное среднее — по календарю, а не по числу записей: пропуски не сдвигают окно
  const avg=pts.map(pt=>{
    const w=pts.filter(o=>o.x<=pt.x && o.x>pt.x-7);
    return {x:pt.x, y:w.reduce((a,b)=>a+b.y,0)/w.length};
  });
  if(pts.length>=7){
    g+='<polyline fill="none" stroke="var(--kin)" stroke-width="2" points="'
      +avg.map(a=>p.X(a.x).toFixed(1)+','+p.Y(a.y).toFixed(1)).join(' ')+'"/>';
  }
  g+='<polyline fill="none" stroke="var(--bone-3)" stroke-width="1" points="'
    +pts.map(a=>p.X(a.x).toFixed(1)+','+p.Y(a.y).toFixed(1)).join(' ')+'"/>';
  pts.forEach(a=>{ g+='<circle cx="'+p.X(a.x).toFixed(1)+'" cy="'+p.Y(a.y).toFixed(1)+'" r="2" fill="var(--bone-2)"/>'; });
  g+=xTicks(p,pts)+p.close;

  // База для тревоги берётся С ОТСТАВАНИЕМ на 3 дня. Если сравнивать с обычным
  // 7-дневным средним, оно включает сами поднятые дни, ползёт вверх следом и
  // маскирует всплеск: чем дольше недовосстановление, тем спокойнее график.
  const last=pts[pts.length-1], lx=last.x;
  const baseW=pts.filter(o=>o.x<lx-3 && o.x>=lx-10);
  let note='';
  if(baseW.length>=4){
    const base=baseW.reduce((a,b)=>a+b.y,0)/baseW.length;
    const d=Math.round((last.y-base)*10)/10;
    if(d>=5) note='<div style="font-size:12px;color:var(--shu);margin-top:6px">Выше своей базы на '+d
      +' уд/мин. Устойчивый рост на 5–7 обычно значит недовосстановление — есть смысл сделать день легче '
      +'или свериться с самочувствием.</div>';
    else note='<div style="font-size:12px;color:var(--bone-2);margin-top:6px">База (7 дней, с отставанием на 3): <b style="color:var(--bone)">'
      +base.toFixed(1)+'</b> · сегодня '+(d>0?'+':'')+d+' уд/мин.</div>';
  } else {
    note='<div style="font-size:12px;color:var(--bone-3);margin-top:6px">Золотая линия — среднее за 7 дней. '
      +'Сравнение с базой появится, когда наберётся 10 дней подряд.</div>';
  }
  return '<div class="panel"><div class="lbl">ПУЛЬС ПОКОЯ, УД/МИН</div>'+g+note+'</div>';
}

// 2. Часы сна: столбики + полоса цели 8–9 ч.
function chartSleep(all){
  const pts=Object.keys(all).sort().map(iso=>{
    const s=all[iso].sleep||{};
    const v=parseFloat(sleepDur(s.bed,s.wake,s.h));
    return v ? {iso, x:dnum(iso), y:v} : null;
  }).filter(Boolean);
  if(pts.length<2) return needMore('СОН, ЧАСОВ', pts.length, 2, 'Нужно хотя бы две ночи.');

  const hi=Math.max(10, Math.ceil(Math.max.apply(null,pts.map(p=>p.y))+0.5));
  const p=plot(pts, 0, hi, 380, 120);
  let g=p.open;
  g+='<rect x="'+p.L+'" y="'+p.Y(9).toFixed(1)+'" width="'+(p.W-p.L-6)+'" height="'+(p.Y(8)-p.Y(9)).toFixed(1)
    +'" fill="var(--kin)" opacity="0.10"/>';
  const bw=Math.max(3, Math.min(14, (p.W-p.L-6)/(pts.length*1.6)));
  pts.forEach(a=>{
    const y=p.Y(a.y), x=p.X(a.x)-bw/2;
    g+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+(p.Y(0)-y).toFixed(1)
      +'" fill="'+(a.y>=8?'var(--kin)':'var(--bone-3)')+'" rx="1"/>';
  });
  g+=xTicks(p,pts)+p.close;
  const avg=pts.reduce((a,b)=>a+b.y,0)/pts.length;
  return '<div class="panel"><div class="lbl">СОН, ЧАСОВ</div>'+g
    +'<div style="font-size:12px;color:var(--bone-2);margin-top:6px">Среднее <b style="color:var(--bone)">'
    +avg.toFixed(1)+' ч</b> · золотым — ночи от 8 ч, полоса — цель 8–9.</div></div>';
}

// 3. Сон против качества тренировок. Тут легко соврать: по десяти точкам
// «связь» покажется какая угодно. Поэтому число (корреляцию) считаем только с 14.
function chartSleepVsQ(all){
  const pts=[];
  Object.keys(all).sort().forEach(iso=>{
    const lg=all[iso], s=lg.sleep||{};
    const hrs=parseFloat(sleepDur(s.bed,s.wake,s.h));
    const qs=Object.values(lg.sessions||{}).map(x=>parseFloat(x.q)).filter(x=>x>0);
    if(hrs && qs.length) pts.push({iso, x:hrs, y:qs.reduce((a,b)=>a+b,0)/qs.length});
  });
  if(pts.length<5) return needMore('СОН ↔ КАЧЕСТВО ТРЕНИРОВОК', pts.length, 5,
    'Каждая точка — ночь и качество тренировок следующего дня.');

  const p=plot(pts, 1, 5, 380, 120);
  let g=p.open;
  pts.forEach(a=>{ g+='<circle cx="'+p.X(a.x).toFixed(1)+'" cy="'+p.Y(a.y).toFixed(1)+'" r="3" fill="var(--kin)" opacity="0.75"/>'; });
  const xs=pts.map(a=>a.x);
  g+='<text x="'+p.L+'" y="'+(p.H-4)+'" fill="var(--bone-3)" font-size="8">'+Math.min.apply(null,xs).toFixed(1)+' ч</text>'
    +'<text x="'+(p.W-6)+'" y="'+(p.H-4)+'" fill="var(--bone-3)" font-size="8" text-anchor="end">'+Math.max.apply(null,xs).toFixed(1)+' ч</text>';
  g+=p.close;

  let note;
  if(pts.length>=14){
    const n=pts.length, sx=pts.reduce((a,b)=>a+b.x,0), sy=pts.reduce((a,b)=>a+b.y,0);
    const sxy=pts.reduce((a,b)=>a+b.x*b.y,0), sxx=pts.reduce((a,b)=>a+b.x*b.x,0), syy=pts.reduce((a,b)=>a+b.y*b.y,0);
    const den=Math.sqrt((n*sxx-sx*sx)*(n*syy-sy*sy));
    const r=den? (n*sxy-sx*sy)/den : 0;
    note='Связь: <b style="color:var(--kin)">r = '+(Math.round(r*100)/100)+'</b> по '+n+' дням. '
      +(Math.abs(r)<0.3?'Считай, что связи не видно.':(r>0?'Больше спишь — лучше тренировки.':'Обратная связь, посмотри внимательнее.'))
      +'<br><span style="color:var(--bone-3)">Это наблюдение, а не доказательство: на качество влияет и нагрузка накануне, и всё остальное.</span>';
  } else {
    note='Точек: <b style="color:var(--kin)">'+pts.length+'</b>. Число связи посчитаю с 14 — раньше это гадание.';
  }
  return '<div class="panel"><div class="lbl">СОН ↔ КАЧЕСТВО ТРЕНИРОВОК</div>'+g
    +'<div style="font-size:12px;color:var(--bone-2);margin-top:6px">'+note+'</div></div>';
}

// 4. Выполнение по неделям: сколько тренировок закрыто из запланированных.
function chartWeeks(all){
  const rows=[];
  PLAN.weeks.forEach(w=>{
    let plan=0, done=0;
    w.days.forEach(d=>{
      const lg=all[d.iso]||{};
      d.sessions.forEach((s,i)=>{
        if(s.disc==='Отдых') return;
        plan++;
        if(((lg.sessions||{})[String(i)]||{}).done) done++;
      });
    });
    if(plan) rows.push({n:w.n, plan, done, pct:done/plan});
  });
  const past=rows.filter(r=>r.done>0);
  if(!past.length) return needMore('ВЫПОЛНЕНИЕ ПО НЕДЕЛЯМ', 0, 1, 'Отметь тренировки как выполненные на вкладке «Сегодня».');
  const show=rows.slice(0, Math.max(past[past.length-1] ? rows.indexOf(past[past.length-1])+2 : 4, 4));

  let g='<svg viewBox="0 0 380 110" style="width:100%;height:auto;display:block">';
  const L=26, W=380, H=110, T=8, B=16;
  const bw=Math.max(4, Math.min(22, (W-L-6)/(show.length*1.4)));
  [0,0.5,1].forEach(v=>{
    const y=T+(1-v)*(H-T-B);
    g+='<line x1="'+L+'" y1="'+y+'" x2="'+(W-6)+'" y2="'+y+'" stroke="var(--line)"/>'
      +'<text x="'+(L-4)+'" y="'+(y+3)+'" fill="var(--bone-3)" font-size="8" text-anchor="end">'+(v*100)+'</text>';
  });
  show.forEach((r,i)=>{
    const x=L+(i+0.5)*((W-L-6)/show.length)-bw/2;
    const y=T+(1-r.pct)*(H-T-B), h0=(T+(H-T-B))-y;
    g+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(h0,0).toFixed(1)
      +'" fill="'+(r.pct>=0.85?'var(--kin)':(r.pct>=0.5?'var(--kin-d)':'var(--bone-3)'))+'" rx="1"/>'
      +'<text x="'+(x+bw/2).toFixed(1)+'" y="'+(H-4)+'" fill="var(--bone-3)" font-size="8" text-anchor="middle">Н'+r.n+'</text>';
  });
  g+='</svg>';
  const t=past.reduce((a,b)=>({p:a.p+b.plan, d:a.d+b.done}), {p:0,d:0});
  return '<div class="panel"><div class="lbl">ВЫПОЛНЕНИЕ ПО НЕДЕЛЯМ, %</div>'+g
    +'<div style="font-size:12px;color:var(--bone-2);margin-top:6px">Закрыто <b style="color:var(--bone)">'
    +t.d+' из '+t.p+'</b> тренировок · отдых не считается.</div></div>';
}

function rateHTML(id,val,max){
  max=max||5; let h='<div class="rate" data-rate="'+id+'">';
  for(let i=1;i<=max;i++) h+='<button data-v="'+i+'" class="'+(val==i?'on':'')+'">'+i+'</button>';
  return h+'</div>';
}

        exs.forEach((ex,ei)=>{

    const i=inp.dataset.i, f=inp.dataset.f; draft.sessions[i]=draft.sessions[i]||{}; draft.sessions[i][f]=inp.value; draftTouch();
  });
  function ensureEx(i,ei){ draft.sessions[i]=draft.sessions[i]||{}; draft.sessions[i].ex=draft.sessions[i].ex||{}; draft.sessions[i].ex[ei]=draft.sessions[i].ex[ei]||{sets:[]}; return draft.sessions[i].ex[ei]; }
  function setRowHTML(i,ei,st,si){
    return '<div class="setrow" data-s="'+si+'"><span class="setno">'+(si+1)+'</span>'
      +'<input class="setw" data-i="'+i+'" data-ex="'+ei+'" data-s="'+si+'" data-k="w" value="'+esc(st.w)+'" placeholder="вес кг"> ×'
      +'<input class="setr" data-i="'+i+'" data-ex="'+ei+'" data-s="'+si+'" data-k="r" value="'+esc(st.r)+'" placeholder="повт">'

      const si=+inp.dataset.s, k=inp.dataset.k; const rr=ensureEx(i,ei); while(rr.sets.length<=si) rr.sets.push({w:'',r:''}); rr.sets[si][k]=inp.value; draftTouch();
    });

    const rows=setsBox.querySelectorAll('.setrow'); const cur=[];

  v.querySelectorAll('.gymlog').forEach(gl=>{ const gi=gl.dataset.i; gl.querySelectorAll('.exrow').forEach(row=>{ const ei=row.dataset.ex; const box=row.querySelector('.sets'); if(box) bindSets(box,gi,ei); }); });
  v.querySelectorAll('.addset').forEach(b=>b.onclick=()=>{
    const i=b.dataset.i, ei=b.dataset.ex; const rec=ensureEx(i,ei);
    const setsBox=b.parentNode.querySelector('.sets');
    captureSets(setsBox,rec);
    rec.sets.push({w:'',r:''}); draftTouch();
    setsBox.innerHTML=rec.sets.map((st,k)=>setRowHTML(i,ei,st,k)).join('');
    bindSets(setsBox,i,ei);
  });
  v.querySelectorAll('[data-rate]').forEach(g=>g.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    const id=g.dataset.rate, val=+b.dataset.v;
    g.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');

    draftTouch();

  const bed=v.querySelector('#slBed'), wake=v.querySelector('#slWake');
  const updDur=()=>{ draft.sleep.bed=bed.value; draft.sleep.wake=wake.value; v.querySelector('#slDur').textContent=sleepDur(bed.value,wake.value); draftTouch(); };
  bed.oninput=updDur; wake.oninput=updDur;
  v.querySelector('#slHr').oninput=e=>{ draft.sleep.hr=e.target.value; draftTouch(); };
  v.querySelector('#dayNote').oninput=e=>{ draft.note=e.target.value; draftTouch(); };
  v.querySelector('#saveBtn').onclick=async()=>{
    await flushDraft();
    v.querySelector('#savedMsg').textContent='Сохранено ✓ '+cur.date;
    setTimeout(()=>{const m=v.querySelector('#savedMsg'); if(m) m.textContent='';},2500);
  };
}

function sleepDur(bed,wake,h){
  if((!bed||!wake) && h) return (Math.round(h*10)/10).toFixed(1).replace('.0','')+' ч';
  if(!bed||!wake) return '—';
  const [bh,bm]=bed.split(':').map(Number), [wh,wm]=wake.split(':').map(Number);
  let mins=(wh*60+wm)-(bh*60+bm); if(mins<=0) mins+=1440;
  return (Math.round(mins/6)/10).toFixed(1).replace('.0','')+' ч';
}

  h+='<div class="panel"><div class="row"><b style="color:var(--bone)">Неделя '+w.n+'</b>'+badge+'</div>'
    +'<div class="row"><span class="muted">Даты</span><span>'+esc(w.dates)+'</span></div>'
    +'<div class="row"><span class="muted">Фаза</span><span>'+esc(w.phase)+'</span></div>'
    +'<div class="row"><span class="muted">Объём</span><span>'+esc(w.hours)+'</span></div>'
    +'<div class="lbl" style="margin-top:8px">Цель недели</div><div class="goal">'+esc(w.weeklyGoal)+'</div>'
    +'<div class="lbl" style="margin-top:8px">Цель цикла</div><div class="goal muted">'+esc(w.cycleGoal)+'</div></div>';
  w.days.forEach(d=>{
    h+='<div class="panel" style="padding:10px"><div class="row" style="border:none;padding:0 0 6px"><b style="color:var(--bone-2)">'+d.wd+' · '+esc(d.date)+'</b></div>';
    d.sessions.forEach(s=>{
      h+='<div style="display:flex;gap:8px;padding:5px 0;border-top:1px solid var(--line)">'
        +'<i class="ti '+(DISC_IC[s.disc]||'ti-circle')+'" style="color:'+(DISC_COL[s.disc]||'var(--swim)')+';font-size:16px;margin-top:1px"></i>'
        +'<div style="flex:1"><div style="font-size:12px;color:var(--bone)">'+esc(s.name)+'</div>'
        +'<div style="font-size:10px;color:var(--bone-3)">'+esc([s.dur,s.dist,s.zone].filter(x=>x&&x!=='—').join(' · '))+'</div></div></div>';
    });
    h+='</div>';
  });
  v.innerHTML=h;
  v.querySelectorAll('#weekPick button').forEach(b=>b.onclick=()=>{ CUR=PLAN.weeks[+b.dataset.w-1].days[0].iso; render(); });
}

async function renderLog(v){
  const all=await stAll();
  const isos=Object.keys(all).sort().reverse();
  const chart=chartWeeks(all);
  let h='<div class="h">ЖУРНАЛ · ПРОШЛЫЕ РЕЗУЛЬТАТЫ</div>';
  h=chart+h;
  if(!isos.length){ v.innerHTML=h+'<div class="empty">Пока нет записей. Заполни день во вкладке «Сегодня» и сохрани.</div>'; return; }
  // summary stats
  let totDone=0, byDisc={}, sleeps=[], quals=[], moods=[];
  const entries=[];
  for(const iso of isos){
    const log=all[iso]; if(!log) continue;
    const day=ALLDAYS.find(d=>d.iso===iso);
    let done=0;
    Object.entries(log.sessions||{}).forEach(([i,s])=>{ if(s.done){ done++; totDone++; const disc=day?day.sessions[i]?.disc:''; if(disc){byDisc[disc]=(byDisc[disc]||0)+1;} } });
    if(log.sleep&&log.sleep.bed&&log.sleep.wake){ const du=sleepDur(log.sleep.bed,log.sleep.wake,log.sleep.h); const n=parseFloat(du); if(n)sleeps.push(n); }
    if(log.sleep&&log.sleep.q) quals.push(log.sleep.q);
    if(log.mood) moods.push(log.mood);
    entries.push({iso,day,done,log});
  }
  const avg=a=>a.length?(a.reduce((x,y)=>x+y,0)/a.length):0;
  h+='<div class="panel"><div class="lbl">Сводка прогресса</div>';
  h+='<div class="stat"><i class="ti ti-check" style="color:var(--kin)"></i><span class="muted">Тренировок выполнено</span><span class="n">'+totDone+'</span></div>';
  ['Плавание','Вело','Бег','Зал'].forEach(d=>{ h+='<div class="stat"><i class="ti '+DISC_IC[d]+'" style="color:'+DISC_COL[d]+'"></i><span class="muted">'+d+'</span><span class="n">'+(byDisc[d]||0)+'</span></div>'; });
  h+='<div class="stat"><i class="ti ti-bed" style="color:var(--swim)"></i><span class="muted">Ср. сон</span><span class="n">'+(sleeps.length?avg(sleeps).toFixed(1)+' ч':'—')+'</span></div>';
  h+='<div class="stat"><i class="ti ti-star" style="color:var(--kin)"></i><span class="muted">Ср. качество сна</span><span class="n">'+(quals.length?avg(quals).toFixed(1):'—')+'</span></div>';
  h+='<div class="stat"><i class="ti ti-mood-smile" style="color:var(--gym)"></i><span class="muted">Ср. настроение</span><span class="n">'+(moods.length?avg(moods).toFixed(1):'—')+'</span></div></div>';

  entries.forEach(e=>{
    const total=e.day?e.day.sessions.filter(s=>s.disc!=='Отдых'&&s.disc!=='Восстановление').length:0;
    const du=e.log.sleep&&e.log.sleep.bed?sleepDur(e.log.sleep.bed,e.log.sleep.wake,e.log.sleep.h):'—';
    h+='<div class="panel" style="padding:10px" data-open="'+e.iso+'">'
      +'<div class="row" style="border:none;padding:0"><b style="color:var(--bone)">'+(e.day?e.day.wd+' · '+e.day.date:e.iso)+'</b>'
      +'<span class="badge">'+e.done+(total?'/'+total:'')+' трен.</span></div>'
      +'<div style="font-size:11px;color:var(--bone-2);margin-top:5px">Сон '+du+' · качество '+(e.log.sleep&&e.log.sleep.q?e.log.sleep.q:'—')+' · настроение '+(e.log.mood||'—')+'</div>'
      +(e.log.note?'<div style="font-size:11px;color:var(--bone-2);margin-top:4px">'+esc(e.log.note)+'</div>':'')+'</div>';
  });
  v.innerHTML=h;
  v.querySelectorAll('[data-open]').forEach(p=>p.onclick=()=>{ CUR=p.dataset.open; TAB='today'; render(); });
}

async function renderSleep(v){
  const all=await stAll(); const isos=Object.keys(all).sort().reverse();
  let h=chartHR(all)+chartSleep(all)+chartSleepVsQ(all);
  h+='<div class="h">СОН · ИСТОРИЯ</div>';
  const rows=[];
  for(const iso of isos){ const log=all[iso]; if(log&&log.sleep&&((log.sleep.bed&&log.sleep.wake)||log.sleep.h)){ const day=ALLDAYS.find(d=>d.iso===iso); rows.push({iso,day,s:log.sleep}); } }
  if(!rows.length){ v.innerHTML=h+'<div class="empty">Нет записей сна. Заполни «Лёг / Проснулся» на вкладке «Сегодня».</div>'; return; }
  const nums=rows.map(r=>parseFloat(sleepDur(r.s.bed,r.s.wake,r.s.h))).filter(x=>x);
  const avg=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length):0;
  h+='<div class="panel"><div class="row"><span class="muted">Средний сон</span><b style="color:var(--bone)">'+avg.toFixed(1)+' ч</b></div>'
    +'<div class="row"><span class="muted">Цель</span><span>8–9 ч</span></div>'
    +'<div style="font-size:11px;color:var(--bone-2);margin-top:6px">Пульс покоя утром — ранний маркер восстановления. Рост на 5–7 уд/мин над обычным = сделай день легче.</div></div>';
  h+='<table><tr><th>Дата</th><th>Лёг</th><th>Встал</th><th>Часов</th><th>Кач.</th><th>Пульс</th></tr>';
  rows.forEach(r=>{ h+='<tr><td>'+(r.day?r.day.date:r.iso)+'</td><td>'+esc(r.s.bed||'—')+'</td><td>'+esc(r.s.wake||'—')+'</td><td>'+sleepDur(r.s.bed,r.s.wake,r.s.h)+'</td><td>'+(r.s.q||'—')+'</td><td>'+(r.s.hr||'—')+'</td></tr>'; });
  h+='</table>';
  v.innerHTML=h;
}

function renderInfo(v){
  let h='<div class="subnav">';
  const subs=[['overview','Обзор недель'],['gym','Зал / ОФП'],['macros','БЖУ'],['legend','Легенда'],['glossary','Глоссарий'],['cart','Картридж']];
  subs.forEach(([k,n])=>h+='<button data-sub="'+k+'" class="'+(INFOSUB===k?'on':'')+'">'+n+'</button>');
  h+='</div><div id="infoBody"></div>';
  v.innerHTML=h;
  v.querySelectorAll('[data-sub]').forEach(b=>b.onclick=()=>{ INFOSUB=b.dataset.sub; renderInfo(v); });
  const body=v.querySelector('#infoBody');
  if(INFOSUB==='overview') body.innerHTML=infoOverview();
  else if(INFOSUB==='gym') body.innerHTML=infoGym();
  else if(INFOSUB==='macros') body.innerHTML=infoMacros();
  else if(INFOSUB==='legend') body.innerHTML=infoPairs(PLAN.legend);
  else if(INFOSUB==='glossary') body.innerHTML=infoPairs(PLAN.glossary);
  else if(INFOSUB==='cart') renderCart(body);
}

// ==== КАРТРИДЖ ====
// Таблица в приватном репозитории — единственный носитель.
// Вниз течёт план (колонки A–M), вверх — факты (N–U, сон, дневник зала).
// Синхронизация идёт сама, раз в SYNC_MIN. Здесь — только состояние и ручной пинок.
function fmtTs(ts){
  if(!ts) return '—';
  const d=new Date(ts*1000), p=n=>String(n).padStart(2,'0');
  return p(d.getDate())+'.'+p(d.getMonth()+1)+' '+p(d.getHours())+':'+p(d.getMinutes());
}
async function renderCart(body){
  if(!apiOn()){
    body.innerHTML='<div class="panel"><div style="font-size:13px;color:var(--bone);line-height:1.55">'
      +'Картридж читается только внутри Telegram — здесь нет подписи, сервер не отвечает.<br><br>'
      +'Сейчас работает вшитый план (запасной).</div></div>';
    return;
  }
  body.innerHTML='<div class="panel"><span class="muted">Читаю картридж…</span></div>';
  let st;
  try{ st=await apiFetch('/api/cartridge'); }
  catch(e){ body.innerHTML='<div class="panel"><span style="color:var(--err)">Сервер не отвечает: '+esc(e.message)+'</span></div>'; return; }

  let h='<div class="panel">';
  h+='<div class="row"><span class="muted">Картридж</span><b style="color:'+(st.inserted?'var(--kin)':'var(--err)')+'">'
    +(st.inserted?'v'+st.version:'не загружен')+'</b></div>';
  if(st.inserted){
    h+='<div class="row"><span class="muted">План</span><span>'+st.weeks+' нед · '+st.days+' дней</span></div>'
      +'<div class="row"><span class="muted">Факты сгружены</span><span>'+fmtTs(st.pushed)+'</span></div>'
      +'<div class="row"><span class="muted">Ждут сгрузки</span><span style="color:'+(st.dirty?'var(--kin)':'var(--bone-2)')+'">'
      +(st.dirty?'есть':'нет')+'</span></div>'
      +'<div class="row"><span class="muted">Проверен</span><span>'+fmtTs(st.checked)+'</span></div>';
  }
  if(st.error) h+='<div style="font-size:12px;color:var(--err);margin-top:6px">Ошибка: '+esc(st.error)+'</div>';
  h+='<div style="font-size:12px;color:var(--bone-3);margin-top:8px">'+esc((st.repo||'—')+' / '+(st.path||''))+'</div>'
    +'<div style="font-size:12px;color:var(--bone-3);margin-top:3px">Синхронизация сама, раз в '+(st.syncMin||5)+' мин.</div>';
  h+='</div>';
  h+='<button class="save" id="cSync">СИНХРОНИЗИРОВАТЬ СЕЙЧАС</button>';
  h+='<button class="save" id="cSnap" style="margin-top:8px">ПРИСЛАТЬ ТАБЛИЦУ В ЧАТ</button>';
  h+='<div class="savedmsg" id="cMsg"></div>';
  body.innerHTML=h;

  const msg=body.querySelector('#cMsg');
  const say=(t,ok)=>{ msg.textContent=t; msg.style.color=ok===false?'var(--err)':'var(--kin)'; };
  body.querySelector('#cSync').onclick=async()=>{
    say('Синхронизирую…');
    try{
      const r=await apiFetch('/api/cartridge/sync',{method:'POST'});
      say('✓ v'+r.version+(r.pushed?' · факты сгружены':' · факты уже в таблице'));
      if(await loadPlan()) render();
    }catch(e){ say('Не вышло: '+e.message, false); }
  };
  body.querySelector('#cSnap').onclick=async()=>{
    say('Собираю таблицу…');
    try{ const r=await apiFetch('/api/export/send',{method:'POST'}); say('✓ Файл в чате: '+r.filename); }
    catch(e){ say('Не вышло: '+e.message, false); }
  };
}
function infoOverview(){
  let h='<table><tr><th>Нед</th><th>Тип</th><th>Объём</th><th>Цель недели</th></tr>';
  PLAN.weeks.forEach(w=>{ h+='<tr><td>'+w.n+'</td><td>'+esc(w.weekType)+'</td><td>'+esc(w.hours)+'</td><td>'+esc(w.weeklyGoal)+'</td></tr>'; });
  return h+'</table>';
}
function infoGym(){
  let h=''; PLAN.gym.forEach(g=>{
    if(!g.ex){ h+='<div class="sec">'+esc(g.block)+'</div>'; }
    else h+='<div class="panel" style="padding:9px 10px"><div style="font-size:12px;color:var(--bone)">'+esc(g.ex)+'</div>'
      +'<div style="font-size:11px;color:var(--bone-2);margin-top:3px">Ф0–1: '+esc(g.p01)+' · Ф2: '+esc(g.p2)+' · Ф3–4: '+esc(g.p34)+'</div>'
      +'<div style="font-size:11px;color:var(--bone-3);margin-top:3px">'+esc(g.focus)+'</div></div>';
  }); return h;
}
function infoMacros(){
  let h='<table><tr><th>Фаза</th><th>Обычный день</th><th>Тяжёлый день</th></tr>';
  PLAN.macros.forEach(m=>{ h+='<tr><td>'+esc(m.phase)+'<br><span class="muted" style="font-size:10px">нед '+esc(m.weeks)+'</span></td>'
    +'<td>'+m.base.c+'у / '+m.base.p+'б / '+m.base.f+'ж<br><span class="muted">'+m.base.kcal+' ккал</span></td>'
    +'<td>'+m.heavy.c+'у / '+m.heavy.p+'б / '+m.heavy.f+'ж<br><span class="muted">'+m.heavy.kcal+' ккал</span></td></tr>'
    +'<tr><td colspan="3" style="color:var(--bone-2)">'+esc(m.note)+'</td></tr>'; });
  return h+'</table>';
}
function infoPairs(arr){
  let h='';
  arr.forEach(([a,b])=>{
    if(!b){ h+='<div class="sec">'+esc(a)+'</div>'; }
    else h+='<div class="panel" style="padding:9px 10px"><div style="font-size:12px;color:var(--bone-2);font-weight:500">'+esc(a)+'</div><div style="font-size:11px;color:var(--bone);margin-top:3px;line-height:1.45">'+esc(b)+'</div></div>';
  });
  return h;
}

function renderNav(){
  const items=[['today','ti-clipboard-check','Сегодня'],['plan','ti-calendar','План'],['log','ti-history','Журнал'],['sleep','ti-bed','Сон'],['info','ti-book','Инфо']];
  document.getElementById('nav').innerHTML=items.map(([k,ic,n])=>'<button data-tab="'+k+'" class="'+(TAB===k?'on':'')+'"><i class="ti '+ic+'"></i>'+n+'</button>').join('');
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=async()=>{ await flushDraft(); TAB=b.dataset.tab; window.scrollTo(0,0); render(); retryPlan(); });
}

async function loadPlan(){
  if(!apiOn()) return false;                      // вне Telegram — вшитый план
  try{
    const d=await apiFetch('/api/plan');
    if(d && d.plan && d.plan.weeks && d.plan.weeks.length){
      PLAN=d.plan; PLAN_SRC=d.source||null;
      PLAN_FALLBACK=false;
      planCacheSet(d.plan);
      rebuildDays();
      CUR=(findDayIso(isoToday())||ALLDAYS[0]).iso;
      // План мог доехать уже ПОСЛЕ таймаута загрузки. Без этой перерисовки на экране
      // осталась бы вшитая копия, но уже без предупреждения — хуже, чем совсем без него.
      if(BOOTED){ await flushDraft(); render(); }
      return true;
    }
  }catch(e){ console.warn('plan', e); }           // сервер лёг — работаем на вшитом
  return false;
}

// Связь вернулась — молча подтягиваем настоящий план. Пробуем при каждом
// переключении вкладки, но не чаще одного запроса за раз.
function retryPlan(){
  if(!PLAN_FALLBACK || PLAN_TRY || !apiOn()) return;
  PLAN_TRY=true;
  loadPlan().finally(()=>{ PLAN_TRY=false; });
}

// Один заход плана — одна отрисовка. Раньше мигало: вшитый план, через полсекунды подмена.
// Ждём картридж не дольше 2.5 с, дальше рисуем на вшитом — план дня важнее свежести.
(async function boot(){
  if(TG){ try{ TG.ready(); TG.expand(); }catch(e){} }
  // Из памяти — сразу, не дожидаясь сети: план дня важнее свежести.
  const cached=planCacheGet();
  if(cached && cached.weeks && cached.weeks.length){
    PLAN=cached; rebuildDays();
    CUR=(findDayIso(isoToday())||ALLDAYS[0]).iso;
    BOOTED=true; render();
    loadPlan();                                   // освежаем в фоне, render внутри сам
    return;
  }
  document.getElementById('view').innerHTML='<div class="empty">Читаю картридж…</div>';
  try{ await Promise.race([loadPlan(), new Promise(r=>setTimeout(r,4000))]); }
  catch(e){ console.warn('boot', e); }
  BOOTED=true;
  render();
})();
</script>
